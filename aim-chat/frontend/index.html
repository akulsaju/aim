<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIM Chat - Simple AI Chatbot</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <h1 class="logo">💬 AIM Chat</h1>
            <div class="status-bar">
                <span class="status-indicator" id="statusIndicator">●</span>
                <span class="status-text" id="statusText">Offline</span>
            </div>
        </div>
    </header>

    <!-- Main Container -->
    <div class="container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-section">
                <h3>📚 Available Models</h3>
                <div id="modelsList" class="models-list">
                    <p class="loading-text">Loading models...</p>
                </div>
            </div>
            
            <div class="sidebar-section">
                <h3>ℹ️ Current Model</h3>
                <div id="modelInfo" class="model-info">
                    <p class="no-model-text">No model loaded</p>
                </div>
            </div>
            
            <div class="sidebar-section">
                <button class="btn btn-secondary btn-full" onclick="clearChat()">
                    🗑️ Clear Chat
                </button>
            </div>
        </aside>

        <!-- Chat Area -->
        <main class="chat-container">
            <div class="welcome-screen" id="welcomeScreen">
                <div class="welcome-content">
                    <h2>👋 Welcome to AIM Chat</h2>
                    <p>Select a model from the sidebar to start chatting</p>
                    <div class="welcome-features">
                        <div class="feature">
                            <span class="feature-icon">🤖</span>
                            <p>Knowledge-based responses</p>
                        </div>
                        <div class="feature">
                            <span class="feature-icon">⚡</span>
                            <p>Fast & lightweight</p>
                        </div>
                        <div class="feature">
                            <span class="feature-icon">🔒</span>
                            <p>100% local & private</p>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="chat-area" id="chatArea" style="display: none;">
                <!-- Chat Messages -->
                <div class="messages" id="messagesContainer">
                    <!-- Messages will be added here dynamically -->
                </div>
                
                <!-- Input Area -->
                <div class="input-area">
                    <div class="input-container">
                        <textarea 
                            id="messageInput" 
                            placeholder="Type your message here..." 
                            rows="1"
                            onkeypress="handleKeyPress(event)"
                        ></textarea>
                        <button class="btn btn-primary btn-send" onclick="sendMessage()">
                            <span>Send</span>
                            <span class="send-icon">➤</span>
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast"></div>

    <script src="app.js"></script>
</body>
</html>
